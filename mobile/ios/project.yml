name: TikTokLiveCompanion
options:
  bundleIdPrefix: app.tiktoklivecompanion
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  TikTokLiveCompanion:
    type: application
    platform: iOS
    sources:
      - path: TikTokLiveCompanion
      - path: Resources
        buildPhase: resources
    info:
      path: TikTokLiveCompanion/Info.plist
    entitlements:
      path: TikTokLiveCompanion/TikTokLiveCompanion.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tiktoklivecompanion.ios
  TikTokLiveCompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources: [TikTokLiveCompanionTests]
    dependencies:
      - target: TikTokLiveCompanion
